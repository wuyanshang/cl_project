<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>资产字段语义歧义检测流程</title>
<style>body{margin:0;background:#f5f7fa;display:flex;justify-content:center;padding:30px 0;}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1460" viewBox="0 0 960 1460" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <filter id="bg"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-opacity="0.08"/></filter>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#1565C0"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#2E7D32"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#E65100"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#B85450"/></marker>
    <marker id="ak" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#333"/></marker>
  </defs>

  <rect width="960" height="1460" rx="12" fill="#fff" filter="url(#bg)"/>

  <!-- 标题 -->
  <text x="480" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1A237E">资产字段语义歧义检测流程</text>

  <!-- ======= Excel 文件输入 ======= -->
  <rect x="350" y="70" width="250" height="42" rx="21" fill="#BBDEFB" stroke="#1565C0" stroke-width="2" filter="url(#sh)"/>
  <text x="475" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">Excel 文件输入</text>
  <line x1="475" y1="112" x2="475" y2="138" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ======= Excel 解析 ======= -->
  <rect x="295" y="140" width="360" height="42" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="475" y="166" text-anchor="middle" font-size="14" fill="#333">Excel 解析 &amp; 列别名映射</text>
  <line x1="475" y1="182" x2="475" y2="208" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ======= 数据分批 ======= -->
  <rect x="295" y="210" width="360" height="42" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="475" y="236" text-anchor="middle" font-size="14" fill="#333">数据分批 &amp; 多线程并行处理</text>
  <line x1="475" y1="252" x2="475" y2="300" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- ========== 规范性检查 区域 ========== -->
  <rect x="85" y="278" width="790" height="198" rx="12" fill="#F3E5F5" fill-opacity="0.4" stroke="#CE93D8" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="100" y="298" font-size="14" font-weight="bold" fill="#6A1B9A">规范性检查（Java 正则）</text>

  <rect x="300" y="302" width="350" height="42" rx="10" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="475" y="328" text-anchor="middle" font-size="13" fill="#333">规范性校验（字段非空 / 格式校验 / 命名规范 等）</text>
  <line x1="475" y1="344" x2="475" y2="373" stroke="#9673A6" stroke-width="1.5" marker-end="url(#ak)"/>

  <!-- 菱形：通过？ center=(475,408) -->
  <polygon points="475,373 565,408 475,443 385,408" fill="#F3E5F5" stroke="#9673A6" stroke-width="1.5"/>
  <text x="475" y="413" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">通过？</text>

  <!-- 否 → 打标 -->
  <line x1="565" y1="408" x2="648" y2="408" stroke="#B85450" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="602" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#B85450">否</text>
  <rect x="656" y="390" width="155" height="36" rx="10" fill="#F8CECC" stroke="#B85450" stroke-width="1.5" filter="url(#sh)"/>
  <text x="734" y="413" text-anchor="middle" font-size="12" fill="#B85450">打标记录（不拦截）</text>

  <!-- 打标 → 虚线拐弯汇入主线 -->
  <path d="M734,426 L734,490 L475,490" stroke="#B85450" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="610" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="#B85450">继续</text>

  <!-- ★ 修正：从菱形底部(475,443)一路直连到D1顶部(475,545)，x 完全对齐 -->
  <line x1="475" y1="443" x2="475" y2="543" stroke="#333" stroke-width="2" marker-end="url(#ak)"/>
  <text x="460" y="495" text-anchor="end" font-size="11" font-weight="bold" fill="#333">是</text>

  <!-- ========== 阶段一：联合消歧 ========== -->
  <rect x="85" y="500" width="790" height="545" rx="12" fill="#E8F5E9" fill-opacity="0.4" stroke="#81C784" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="100" y="523" font-size="14" font-weight="bold" fill="#2E7D32">阶段一：联合消歧（LLM）</text>

  <!-- 消歧成功竖条 覆盖 D1~D5 -->
  <rect x="720" y="538" width="128" height="470" rx="12" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2.5" filter="url(#sh)"/>
  <text x="784" y="720" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">消歧成功</text>
  <text x="784" y="748" text-anchor="middle" font-size="13" fill="#1B5E20">无歧义</text>
  <text x="784" y="780" text-anchor="middle" font-size="12" fill="#2E7D32">跳过阶段二</text>
  <text x="784" y="800" text-anchor="middle" font-size="12" fill="#2E7D32">直接输出</text>

  <!-- ===== D1 ===== center=(475,580) ★ x 对齐到 475 -->
  <polygon points="475,545 610,580 475,615 340,580" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <text x="475" y="577" text-anchor="middle" font-size="12">D1: 字段中文名本身清晰？</text>
  <text x="475" y="593" text-anchor="middle" font-size="10" fill="#555">（中文名权威性原则）</text>
  <line x1="610" y1="580" x2="718" y2="580" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="663" y="573" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">是</text>
  <line x1="475" y1="615" x2="475" y2="640" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="490" y="635" font-size="11" font-weight="bold" fill="#E65100">否</text>

  <!-- ===== D2 ===== center=(475,675) -->
  <polygon points="475,640 610,675 475,710 340,675" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <text x="475" y="679" text-anchor="middle" font-size="12">D2: 中英文名互补消歧？</text>
  <line x1="610" y1="675" x2="718" y2="675" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="663" y="668" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">是</text>
  <line x1="475" y1="710" x2="475" y2="735" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="490" y="730" font-size="11" font-weight="bold" fill="#E65100">否</text>

  <!-- ===== D3 ===== center=(475,770) -->
  <polygon points="475,735 620,770 475,805 330,770" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <text x="475" y="774" text-anchor="middle" font-size="12">D3: 表名/系统名 + 字段名推断？</text>
  <line x1="620" y1="770" x2="718" y2="770" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="668" y="763" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">是</text>
  <line x1="475" y1="805" x2="475" y2="830" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="490" y="825" font-size="11" font-weight="bold" fill="#E65100">否</text>

  <!-- ===== D4 ===== center=(475,865) -->
  <polygon points="475,830 610,865 475,900 340,865" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <text x="475" y="869" text-anchor="middle" font-size="12">D4: 字段英文名清晰？</text>
  <line x1="610" y1="865" x2="718" y2="865" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="663" y="858" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">是</text>
  <line x1="475" y1="900" x2="475" y2="925" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="490" y="920" font-size="11" font-weight="bold" fill="#E65100">否</text>

  <!-- ===== D5 ===== center=(475,960) -->
  <polygon points="475,925 620,960 475,995 330,960" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <text x="475" y="964" text-anchor="middle" font-size="12">D5: 系统名 + 字段名联合推断？</text>
  <line x1="620" y1="960" x2="718" y2="960" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="668" y="953" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">是</text>
  <!-- ★ 修正：D5 否向下，去掉箭头头 -->
  <line x1="475" y1="995" x2="475" y2="1035" stroke="#E65100" stroke-width="2"/>
  <text x="460" y="1025" text-anchor="end" font-size="11" font-weight="bold" fill="#E65100">否，全部失败</text>

  <!-- 消歧成功 → 绕右侧虚线到 Excel 输出 -->
  <path d="M848,1008 L870,1008 L870,1300 L640,1300" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#ag)"/>

  <!-- ========== 阶段二：歧义分类 ========== -->
  <rect x="85" y="1050" width="790" height="200" rx="12" fill="#FFF8E1" fill-opacity="0.45" stroke="#FFD54F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="100" y="1073" font-size="14" font-weight="bold" fill="#E65100">阶段二：歧义分类（仅消歧失败的数据 / LLM）</text>

  <!-- 分叉线 -->
  <line x1="475" y1="1035" x2="475" y2="1090" stroke="#E65100" stroke-width="1.5"/>
  <line x1="200" y1="1090" x2="720" y2="1090" stroke="#E65100" stroke-width="1.5"/>
  <line x1="200" y1="1090" x2="200" y2="1108" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="475" y1="1090" x2="475" y2="1108" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="720" y1="1090" x2="720" y2="1108" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- A1 -->
  <rect x="112" y="1112" width="176" height="54" rx="10" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5" filter="url(#sh)"/>
  <text x="200" y="1133" text-anchor="middle" font-size="15" font-weight="bold" fill="#C62828">A1</text>
  <text x="200" y="1153" text-anchor="middle" font-size="12" fill="#333">中英文名不匹配</text>

  <!-- A2 -->
  <rect x="387" y="1112" width="176" height="54" rx="10" fill="#FFE0B2" stroke="#FB8C00" stroke-width="1.5" filter="url(#sh)"/>
  <text x="475" y="1133" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">A2</text>
  <text x="475" y="1153" text-anchor="middle" font-size="12" fill="#333">缩写不明确</text>

  <!-- A3 -->
  <rect x="632" y="1112" width="176" height="54" rx="10" fill="#BBDEFB" stroke="#1E88E5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="720" y="1133" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">A3</text>
  <text x="720" y="1153" text-anchor="middle" font-size="12" fill="#333">字典歧义 / 不完整</text>

  <!-- A1 A2 A3 汇聚 -->
  <line x1="200" y1="1166" x2="200" y2="1185" stroke="#E65100" stroke-width="1.5"/>
  <line x1="475" y1="1166" x2="475" y2="1185" stroke="#E65100" stroke-width="1.5"/>
  <line x1="720" y1="1166" x2="720" y2="1185" stroke="#E65100" stroke-width="1.5"/>
  <line x1="200" y1="1185" x2="720" y2="1185" stroke="#E65100" stroke-width="1.5"/>
  <line x1="475" y1="1185" x2="475" y2="1203" stroke="#E65100" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- 汇总严重度 -->
  <rect x="250" y="1207" width="410" height="42" rx="10" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5" filter="url(#sh)"/>
  <text x="455" y="1233" text-anchor="middle" font-size="13" fill="#333">汇总歧义结果 &amp; 确定严重度（HIGH / MEDIUM / LOW）</text>

  <!-- ======= 输出区 ======= -->
  <line x1="455" y1="1249" x2="455" y2="1278" stroke="#333" stroke-width="2" marker-end="url(#ak)"/>

  <rect x="275" y="1280" width="360" height="42" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="455" y="1306" text-anchor="middle" font-size="14" fill="#333">生成结果 Excel（追加检测结果列）</text>

  <line x1="455" y1="1322" x2="455" y2="1348" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <rect x="340" y="1350" width="250" height="42" rx="21" fill="#BBDEFB" stroke="#1565C0" stroke-width="2" filter="url(#sh)"/>
  <text x="465" y="1376" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565C0">输出检测报告 / API 响应</text>

  <!-- ======= 图例 ======= -->
  <g transform="translate(95,1418)" font-size="11" fill="#666">
    <rect width="14" height="14" rx="3" fill="#BBDEFB" stroke="#1565C0"/>       <text x="20" y="12">输入/输出</text>
    <rect x="105" width="14" height="14" rx="3" fill="#E1D5E7" stroke="#9673A6"/><text x="125" y="12">规范性检查</text>
    <rect x="230" width="14" height="14" rx="3" fill="#C8E6C9" stroke="#43A047"/><text x="250" y="12">阶段一消歧</text>
    <rect x="350" width="14" height="14" rx="3" fill="#FFF8E1" stroke="#FFD54F"/><text x="370" y="12">阶段二分类</text>
    <rect x="465" width="14" height="14" rx="3" fill="#F8CECC" stroke="#B85450"/><text x="485" y="12">打标</text>
    <line x1="540" y1="7" x2="570" y2="7" stroke="#2E7D32" stroke-width="2"/>    <text x="576" y="12" fill="#2E7D32">消歧成功</text>
    <line x1="650" y1="7" x2="680" y2="7" stroke="#E65100" stroke-width="2"/>    <text x="686" y="12" fill="#E65100">消歧失败</text>
    <line x1="760" y1="7" x2="790" y2="7" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="796" y="12" fill="#2E7D32">成功绕行</text>
  </g>

</svg>
</body>
</html>
